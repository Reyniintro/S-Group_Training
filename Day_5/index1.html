<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles1.css">
    <title>Welcome Animations</title>
</head>

<body>
    <h1 class="cl-transform">TRANSFORM - HOVER VÀO TỪNG Ô</h1>
    <div class="cl-box">
        <div class="cl-translate cl-smallbox">translate</div>
        <div class="cl-rotate cl-smallbox">rotate</div>
        <div class="cl-scale cl-smallbox">scale</div>
        <div class="cl-combine cl-smallbox">combine</div>
    </div>

    <h1 class="cl-overlayeffect">OVERLAY EFFECT - HOVER VÀO CARD</h1>
    <div class="cl-pic"> 
        <div class="cl-overlay"><img class="cl-smallpic" src="hoangtube.jpg" alt="Hoangtube"></div>
        <div class="cl-overlay"><img class="cl-smallpic" src="toilaBeto.jpg" alt="ToilaBeto"></div>
        <div class="cl-overlay"><img class="cl-smallpic" src="AnneFrank.jpg" alt="AnneFrank"></div>
    </div>

    <h1 class="cl-keyframes">@KEYFRAMES ANIMATION</h1>
    <div class="cl-box">
        <div class="cl-bounce cl-smallbox">bounce</div>
        <div class="cl-spin cl-smallbox">spin</div>
        <div class="cl-pulse cl-smallbox">pulse</div>
        <div class="cl-slidein cl-smallbox">slidein</div>
    </div>

    <h1 class="cl-css">CSS LOADERS (PURE CSS)</h1>
    <div class="cl-box">
        <div class="cl-loader1"></div>
        <div class="cl-loader2">
            <div class="cl-circle cl-c1"></div>
            <div class="cl-circle cl-c2"></div>
            <div class="cl-circle cl-c3"></div>
        </div>
        <div class="cl-loader3">
            <div class="cl-column cl-col1"></div>
            <div class="cl-column cl-col2"></div>
            <div class="cl-column cl-col3"></div>
            <div class="cl-column cl-col4"></div>
            <div class="cl-column cl-col5"></div>
        </div>
    </div>
</body>

</html>
